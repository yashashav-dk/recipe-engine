name: Spicy Chicken Tikka Masala
status: draft
cuisine: Indian
category: protein
servings: 7
prep_time_mins: 20
cook_time_mins: 40
equipment:
  - instant-pot
  - magic-bullet
  - air-fryer
storage:
  fridge_days: 5
  freezer_days: 30
  reheating: "Microwave 2-3 mins with a splash of water, or reheat in a pan on medium for 5 mins. Finish with a squeeze of lemon or pinch of garam masala to refresh."
cost_per_serving_usd: 0.60
tags:
  - high-protein

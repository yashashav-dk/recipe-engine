steps:
  - Cut 4 chicken breasts (~800g) into 3cm chunks
  - "Marinate in a bowl: 125ml Greek yogurt + 15g Three Mangoes Chicken Masala + 5g Kashmiri chilli powder + 3g turmeric + salt. Mix well, set aside."
  - Dice 2 large onions (~300g). Blend in the Magic Bullet to a coarse paste (not too smooth).
  - Make ginger garlic paste in the Magic Bullet if not pre-made (~30g total)
  - "Instant Pot: Sauté mode, high. Add 45ml oil, let it heat up."
  - Add onion paste. Cook 6-7 mins stirring occasionally until golden brown and oil separates. Do not rush this step.
  - Add 30g ginger garlic paste. Stir 1 min until raw smell goes.
  - Add 5g Kashmiri chilli powder + 5g extra red chilli powder. Stir 30 seconds.
  - Pour in the entire 29oz can of tomato puree. Stir well. Cook on sauté 3-4 mins.
  - Cancel sauté. Add marinated chicken pieces. Stir to coat in gravy.
  - "Close lid: Pressure Cook High, 5 minutes. (Do NOT exceed 5 mins — breast goes rubbery.)"
  - Quick release after 5 mins.
  - "Open lid: Sauté mode again. Simmer 8-10 mins to reduce gravy to preferred thickness."
  - Add 250g frozen spinach. Stir and let it wilt into the gravy for 2 mins.
  - Stir in 3 tbsp Greek yogurt (60ml) + 5g garam masala + a pinch of kasuri methi. Stir 1 min. Cancel and done.
  - Let cool 30 mins (do not exceed 2 hours). Split into two 2L glass containers. Fridge immediately.
notes: >
  Day 2-3 tastes best as spices meld. Gravy thickens in fridge overnight — normal and good.
  Browning the onion paste (step 6) is where 70% of the flavor comes from.
  Using the full 29oz tomato puree can makes the curry saucier, which keeps chicken moist all week.
  Serve with quinoa or ready-made chapathi.
  Three Mangoes Chicken Masala from Swastik Spices adds the Telugu-style spice base.
  Grocery: Walmart Great Value tomato puree + Greek yogurt. Everything else from pantry.

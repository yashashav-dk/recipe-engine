steps:
  - Cut 4 chicken breasts (~800g) into 3cm chunks.
  - "Marinate in a bowl: ½ cup Greek yogurt + 1 tbsp Three Mangoes Chicken Masala + 1 tsp Kashmiri chilli powder + 1 tsp turmeric + 1 tsp salt. Mix well, set aside while you prep the base."
  - Dice 4 large onions (~600g). Blend in the Magic Bullet to a coarse paste (not too smooth).
  - Make ginger garlic paste in the Magic Bullet if not pre-made (~2 tbsp total).
  - "Instant Pot: Sauté mode, high. Add 4 tbsp oil, let it heat up."
  - "Add onion paste + 1 tsp salt. Cook 15 mins stirring every 2-3 mins until deep golden brown and oil separates at the edges. Do NOT rush — this is where 70% of the flavor comes from. Reduce to medium if it starts catching."
  - Add 2 tbsp ginger garlic paste. Stir 1-2 mins until raw smell goes.
  - "Add 3 tsp Kashmiri chilli powder + 2 tsp red chilli powder + 1 tbsp Three Mangoes Chicken Masala + 2 tsp salt. Stir 1 min to bloom spices in the oil — they should darken and become fragrant."
  - "Pour in ⅔ of the 29oz tomato puree can (~550g) + ½ tsp sugar. Stir well. Cook on sauté 5-6 mins until oil separates again. The masala should look glossy and come away from the sides."
  - Cancel sauté. Add marinated chicken pieces. Stir to coat in gravy.
  - "Close lid: Pressure Cook High, 5 minutes. (Do NOT exceed 5 mins — breast goes rubbery.)"
  - Quick release after 5 mins.
  - "Open lid: Sauté mode again. Simmer 8-10 mins to reduce gravy to preferred thickness. Taste and adjust salt now."
  - Add 250g frozen spinach. Stir and let it wilt into the gravy for 2 mins.
  - "Stir in ¼ cup Greek yogurt + 1 tsp garam masala + 1 tsp kasuri methi (crushed between palms). Stir 1 min. Cancel."
  - "Optional char: Pull chicken pieces out, spread on air fryer tray. Air fry at 200°C for 4-5 mins until edges char. Return to gravy and stir."
  - Let cool 30 mins (do not exceed 2 hours). Split into two 2L glass containers. Fridge immediately.
notes: >
  Day 2-3 tastes best as spices meld. Gravy thickens in fridge overnight — normal, add water when reheating.
  Browning the onion paste (step 6) is where 70% of the flavor comes from — 15 mins minimum.
  Use ⅔ of the 29oz can — full can makes it too tomatoey and dilutes spices.
  The air fryer char step is what makes this tikka masala, not just butter chicken.
  Season slightly more than tastes perfect — meal prep dulls flavors over days.
  Serve with quinoa or ready-made chapathi.
  Three Mangoes Chicken Masala from Swastik Spices adds the Telugu-style spice base.
  Grocery: Walmart Great Value tomato puree + Greek yogurt + frozen spinach. Everything else from pantry.

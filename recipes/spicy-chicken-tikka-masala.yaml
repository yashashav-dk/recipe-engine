    qty: 185
    unit: ml
  - item: three mangoes chicken masala
    qty: 2
    unit: tbsp
  - item: kashmiri red chilli powder
    qty: 4
    unit: tsp
  - item: red chilli powder
    qty: 2
    unit: tsp
  - item: turmeric
    qty: 1
    unit: tsp
  - item: garam masala
    qty: 1
    unit: tsp
  - item: onion
    qty: 300
    unit: g

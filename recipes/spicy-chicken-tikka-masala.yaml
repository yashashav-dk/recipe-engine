name: Spicy Chicken Tikka Masala
status: draft
cuisine: Indian
category: protein
servings: 7
prep_time_mins: 15
cook_time_mins: 25
equipment:
  - instant-pot
  - magic-bullet
storage:
  fridge_days: 5
  freezer_days: 30
  reheating: "Microwave 2-3 mins with a splash of water, or reheat in a pan on medium for 5 mins"
cost_per_serving_usd: 0.60
tags:
